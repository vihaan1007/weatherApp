<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <header>
        <input type = "text" list = "cities" value = "India" id = "select">
        <datalist id = "cities">
            <option>India</option>
            <option>United States</option>
            <option>China</option>
            <option>Japan</option>

            <option>Germany</option>
            <option>France</option>
            <option>Canada</option>
            <option>Australia</option>
            <option>Russia</option>
            <option>Brazil</option>
            <option>Italy</option>
            <option>South Korea</option>
            <option>Spain</option>
            <option>Mexico</option>
            <option>Indonesia</option>
            <option>Turkey</option>
            <option>Saudi Arabia</option>
            <option>United Arab Emirates</option>
            <option>Singapore</option>
            <option>South Africa</option>
            <option>Pakistan</option>
            <option>Bangladesh</option>
            <option>Nepal</option>
            <option>Sri Lanka</option>
            <option>Thailand</option>
            <option>Malaysia</option>
            <option>Vietnam</option>
            <option>Philippines</option>
            <option>New Zealand</option>
            <option>Netherlands</option>
            <option>Switzerland</option>
            <option>Sweden</option>
            <option>Norway</option>
            <option>Denmark</option>
            <option>Finland</option>
            <option>Poland</option>
            <option>Ukraine</option>
            <option>Argentina</option>
            <option>Chile</option>
            <option>Colombia</option>
            <option>Peru</option>
            <option>Egypt</option>
            <option>Nigeria</option>
            <option>Kenya</option>
            <option>Morocco</option>
            <option>Israel</option>
            <option>Qatar</option>
            <option>Kuwait</option>
            <option>Oman</option>
            <option>Iran</option>
            <option>Iraq</option>
            <option>Afghanistan</option>
            <option>Bhutan</option>
            <option>Myanmar</option>
            <option>Cambodia</option>
            <option>Laos</option>
            <option>Mongolia</option>
            <option>Kazakhstan</option>
            <option>Uzbekistan</option>
            <option>Tajikistan</option>
            <option>Kyrgyzstan</option>
            <option>Turkmenistan</option>
        </datalist>
        <br />
        <br />
        <h1 id = "V">
            Value
        </h1>
    </header>
    <main>
        <br />
        <br />
        <br />
        <br />
        <br />
        <p id = "T">Type</p>
        <br />
        <div id = "b">
            <input type="radio" name="theme" id="C" value = "C" checked>
            <label for="c">C</label>
            <input type="radio" name="theme" id="f" value = "F">
            <label for="f">F</label>
        </div>
        <br />
        <br />
        <div>
            <p id = "H">Humidity:</p>
            <p id = "W">Wind:</p>
            <p id = "F">Feels like:</p>
        </div>
        
    </main>
    <footer>
        <button id = "start">Get weather</button>
        <p id = "f">Value C | Type | Humidity | Wind | Feels like</p>
        <script type = "module" src = "script.js" ></script>
    </footer>
</body>
</html>
